<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetGuard IDS | Secure Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #0b0f19;
            color: #f8fafc;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, transparent 70%);
        }
        .login-container {
            background: #161c2d;
            padding: 3rem;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 420px;
            border: 1px solid #2d3748;
        }
        .brand-logo {
            text-align: center;
            margin-bottom: 2rem;
            color: #3b82f6;
        }
        .form-control, .form-select {
            background-color: #0f172a;
            border: 1px solid #334155;
            color: #f1f5f9;
            padding: 12px;
        }
        .form-control:focus, .form-select:focus {
            background-color: #0f172a;
            border-color: #3b82f6;
            color: white;
            box-shadow: 0 0 0 0.25rem rgba(59, 130, 246, 0.25);
        }
        .btn-primary {
            background-color: #3b82f6;
            border: none;
            padding: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            width: 100%;
            margin-top: 1rem;
            transition: 0.3s;
        }
        .btn-primary:hover {
            background-color: #2563eb;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="brand-logo">
            <i class="fas fa-shield-halved fa-4x mb-3"></i>
            <h3 class="fw-bold text-white">NetGuard IDS</h3>
            <p class="text-secondary small">Ensemble Machine Learning Engine</p>
        </div>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-danger py-2 text-center" style="font-size: 0.85rem;">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="/login" method="POST">
            <div class="mb-3">
                <label class="form-label text-secondary small fw-bold">USERNAME</label>
                <div class="input-group">
                    <span class="input-group-text bg-dark border-secondary text-secondary"><i class="fas fa-user"></i></span>
                    <input type="text" name="username" class="form-control" placeholder="Enter username" required>
                </div>
            </div>
            
            <div class="mb-3">
                <label class="form-label text-secondary small fw-bold">PASSWORD</label>
                <div class="input-group">
                    <span class="input-group-text bg-dark border-secondary text-secondary"><i class="fas fa-lock"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label text-secondary small fw-bold">AUTHORIZATION LEVEL</label>
                <select name="role" class="form-select" required>
                    <option value="analyst">Security Analyst (Monitoring)</option>
                    <option value="admin">System Administrator (Control)</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary">AUTHENTICATE</button>
        </form>
    </div>

</body>
</html>
